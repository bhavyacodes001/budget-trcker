<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Expense Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen font-['Poppins']">
    <!-- Header Section -->
    <header class="bg-gradient-to-r from-blue-600 to-blue-800 text-white py-8 shadow-lg relative overflow-hidden">
        <div class="absolute inset-0 bg-grid-white/[0.05] bg-[size:20px_20px]"></div>
        <div class="container mx-auto px-4 relative">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-3xl md:text-4xl font-bold animate__animated animate__fadeInDown">Income Expense Calculator</h1>
                        <p class="text-blue-100 text-sm md:text-base animate__animated animate__fadeInUp">Track your finances with ease</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <a href="https://github.com/bhavyacodes001/income-expense-calculator.git" target="_blank" class="p-2 rounded-full bg-white/10 hover:bg-white/20 transition-colors duration-300" title="View on GitHub">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Summary Section -->
        <section class="mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-lg transform hover:scale-105 transition-all duration-300 animate__animated animate__fadeInLeft">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-700">Total Income</h2>
                        <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                    </div>
                    <p id="total-income" class="text-3xl font-bold text-green-600">$0.00</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-lg transform hover:scale-105 transition-all duration-300 animate__animated animate__fadeInUp">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-700">Total Expenses</h2>
                        <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                    </div>
                    <p id="total-expenses" class="text-3xl font-bold text-red-600">$0.00</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-lg transform hover:scale-105 transition-all duration-300 animate__animated animate__fadeInRight">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-700">Net Balance</h2>
                        <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                            </svg>
                        </div>
                    </div>
                    <p id="net-balance" class="text-3xl font-bold text-blue-600">$0.00</p>
                </div>
            </div>
        </section>

        <!-- Input Form Section -->
        <section class="bg-white p-8 rounded-xl shadow-lg mb-8 transform hover:scale-[1.01] transition-all duration-300">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Add New Entry</h2>
            <form id="expense-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Description</label>
                        <input type="text" id="description" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required placeholder="Enter description">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Amount</label>
                        <input type="number" id="amount" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required placeholder="Enter amount">
                    </div>
                </div>
                <div class="flex gap-6">
                    <div class="flex items-center">
                        <input type="radio" id="income" name="type" value="income" class="w-5 h-5 text-green-600 focus:ring-green-500">
                        <label for="income" class="ml-2 text-gray-700 font-medium">Income</label>
                    </div>
                    <div class="flex items-center">
                        <input type="radio" id="expense" name="type" value="expense" class="w-5 h-5 text-red-600 focus:ring-red-500">
                        <label for="expense" class="ml-2 text-gray-700 font-medium">Expense</label>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-all duration-300 font-medium transform hover:scale-105">Add Entry</button>
                    <button type="reset" class="bg-gray-500 text-white px-6 py-3 rounded-lg hover:bg-gray-600 transition-all duration-300 font-medium transform hover:scale-105">Reset</button>
                </div>
            </form>
        </section>

        <!-- Filters Section -->
        <section class="bg-white p-6 rounded-xl shadow-lg mb-8 transform hover:scale-[1.01] transition-all duration-300">
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Filter Entries</h2>
            <div class="flex gap-6">
                <div class="flex items-center">
                    <input type="radio" id="filter-all" name="filter" value="all" checked class="w-5 h-5 text-blue-600 focus:ring-blue-500">
                    <label for="filter-all" class="ml-2 text-gray-700 font-medium">All</label>
                </div>
                <div class="flex items-center">
                    <input type="radio" id="filter-income" name="filter" value="income" class="w-5 h-5 text-green-600 focus:ring-green-500">
                    <label for="filter-income" class="ml-2 text-gray-700 font-medium">Income</label>
                </div>
                <div class="flex items-center">
                    <input type="radio" id="filter-expense" name="filter" value="expense" class="w-5 h-5 text-red-600 focus:ring-red-500">
                    <label for="filter-expense" class="ml-2 text-gray-700 font-medium">Expense</label>
                </div>
            </div>
        </section>

        <!-- Entries List Section -->
        <section class="bg-white p-8 rounded-xl shadow-lg transform hover:scale-[1.01] transition-all duration-300">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Transaction History</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Amount</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="entries-list" class="bg-white divide-y divide-gray-200">
                        <!-- Entries will be dynamically added here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
